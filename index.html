<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herbaya Skin Co.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* ===== CONFIG & RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --brand: #2C1810;
  --accent: #8B5E3C;
  --accent-light: #C4956A;
  --cream: #FAF6F0;
  --parchment: #F2EAE0;
  --sand: #E8DDD0;
  --sage: #7A8C6E;
  --text: #1A120B;
  --text-muted: #6B5344;
  --white: #FFFFFF;
  --border: #DDD3C7;
  --success: #5A7A5A;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'Jost', sans-serif;
  --radius: 2px;
  --shadow: 0 4px 24px rgba(44,24,16,0.10);
  --shadow-lg: 0 12px 48px rgba(44,24,16,0.16);
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--cream);
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }
button { cursor: pointer; font-family: var(--sans); border: none; background: none; }
input, textarea, select { font-family: var(--sans); }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--parchment); }
::-webkit-scrollbar-thumb { background: var(--accent-light); border-radius: 3px; }

/* ===== NAVBAR ===== */
#navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(250,246,240,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 5%;
  height: 68px;
  display: flex; align-items: center; justify-content: space-between;
  transition: box-shadow var(--transition);
}
#navbar.scrolled { box-shadow: var(--shadow); }

.nav-brand {
  display: flex; flex-direction: column; align-items: flex-start;
  cursor: pointer;
}
.nav-brand-name {
  font-family: var(--serif);
  font-size: 1.45rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--brand);
  line-height: 1;
}
.nav-brand-tagline {
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  line-height: 1;
  margin-top: 3px;
}

.nav-links { display: flex; gap: 2rem; align-items: center; }
.nav-link {
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  cursor: pointer;
  position: relative;
  transition: color var(--transition);
  padding-bottom: 2px;
}
.nav-link::after {
  content: '';
  position: absolute; bottom: -1px; left: 0; right: 0;
  height: 1px; background: var(--accent);
  transform: scaleX(0); transform-origin: left;
  transition: transform var(--transition);
}
.nav-link:hover { color: var(--brand); }
.nav-link:hover::after { transform: scaleX(1); }

.nav-cart {
  position: relative;
  display: flex; align-items: center; gap: 0.4rem;
  cursor: pointer;
  padding: 8px 14px;
  border: 1px solid var(--border);
  border-radius: 40px;
  font-size: 0.78rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--brand);
  transition: all var(--transition);
}
.nav-cart:hover { background: var(--brand); color: var(--white); border-color: var(--brand); }
.cart-count {
  background: var(--accent);
  color: var(--white);
  border-radius: 50%;
  width: 18px; height: 18px;
  font-size: 0.65rem;
  display: flex; align-items: center; justify-content: center;
  font-weight: 500;
  transition: background var(--transition);
}
.nav-cart:hover .cart-count { background: var(--accent-light); }

/* Mobile menu */
.hamburger {
  display: none;
  flex-direction: column; gap: 5px;
  cursor: pointer; padding: 4px;
}
.hamburger span {
  display: block; width: 24px; height: 1.5px;
  background: var(--brand);
  transition: all var(--transition);
}

/* ===== PAGE WRAPPER ===== */
#app { padding-top: 68px; min-height: 100vh; }
.page { display: none; animation: fadeIn 0.4s ease; }
.page.active { display: block; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ===== HERO ===== */
.hero {
  position: relative;
  height: calc(92vh - 68px);
  min-height: 520px;
  overflow: hidden;
  display: flex; align-items: center;
}
.hero-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
  filter: brightness(0.72);
}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(120deg, rgba(44,24,16,0.65) 0%, rgba(44,24,16,0.15) 60%, transparent 100%);
}
.hero-content {
  position: relative; z-index: 2;
  padding: 0 8%;
  max-width: 640px;
}
.hero-eyebrow {
  font-size: 0.72rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--accent-light);
  margin-bottom: 1.2rem;
  display: flex; align-items: center; gap: 0.8rem;
}
.hero-eyebrow::before {
  content: '';
  width: 32px; height: 1px;
  background: var(--accent-light);
}
.hero-title {
  font-family: var(--serif);
  font-size: clamp(2.8rem, 6vw, 4.8rem);
  font-weight: 300;
  color: var(--white);
  line-height: 1.08;
  margin-bottom: 1.4rem;
  letter-spacing: -0.01em;
}
.hero-title em { font-style: italic; color: var(--accent-light); }
.hero-desc {
  font-size: 0.95rem;
  color: rgba(255,255,255,0.78);
  line-height: 1.75;
  margin-bottom: 2.4rem;
  max-width: 420px;
  font-weight: 300;
}
.hero-cta {
  display: inline-flex; gap: 1rem; flex-wrap: wrap;
}
.btn-primary {
  padding: 14px 32px;
  background: var(--accent);
  color: var(--white);
  border-radius: var(--radius);
  font-size: 0.78rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-weight: 500;
  transition: all var(--transition);
  border: 1px solid transparent;
  cursor: pointer;
}
.btn-primary:hover { background: var(--brand); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(44,24,16,0.3); }

.btn-outline {
  padding: 14px 32px;
  background: transparent;
  color: var(--white);
  border: 1px solid rgba(255,255,255,0.45);
  border-radius: var(--radius);
  font-size: 0.78rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-weight: 400;
  transition: all var(--transition);
  cursor: pointer;
}
.btn-outline:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.7); }

/* ===== SECTION HEADERS ===== */
.section { padding: 80px 5%; }
.section-header { text-align: center; margin-bottom: 56px; }
.section-eyebrow {
  font-size: 0.7rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.8rem;
}
.section-title {
  font-family: var(--serif);
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 400;
  color: var(--brand);
  line-height: 1.18;
}
.section-subtitle {
  font-size: 0.9rem;
  color: var(--text-muted);
  margin-top: 0.6rem;
  font-weight: 300;
}
.divider {
  width: 48px; height: 1px;
  background: var(--accent-light);
  margin: 1rem auto;
}

/* ===== FILTER BAR ===== */
.filter-bar {
  display: flex; align-items: center; gap: 0.6rem;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 48px;
}
.filter-btn {
  padding: 8px 20px;
  border: 1px solid var(--border);
  border-radius: 40px;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  background: transparent;
  transition: all var(--transition);
  cursor: pointer;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active {
  background: var(--brand);
  border-color: var(--brand);
  color: var(--white);
}

/* ===== PRODUCT GRID ===== */
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 32px;
}

/* ===== PRODUCT CARD ===== */
.product-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  cursor: pointer;
  transition: all var(--transition);
  display: flex; flex-direction: column;
  position: relative;
}
.product-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: var(--accent-light);
}
.product-card-img-wrap {
  position: relative;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  background: var(--parchment);
}
.product-card-img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
}
.product-card:hover .product-card-img { transform: scale(1.04); }
.product-card-badge {
  position: absolute; top: 12px; left: 12px;
  background: var(--sage);
  color: var(--white);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 40px;
}
.out-of-stock-overlay {
  position: absolute; inset: 0;
  background: rgba(250,246,240,0.72);
  display: flex; align-items: center; justify-content: center;
}
.out-of-stock-label {
  font-size: 0.7rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
  border: 1px solid var(--border);
  padding: 6px 16px;
  background: var(--white);
  border-radius: 40px;
}

.product-card-body {
  padding: 20px;
  flex: 1;
  display: flex; flex-direction: column;
}
.product-card-cat {
  font-size: 0.65rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
}
.product-card-name {
  font-family: var(--serif);
  font-size: 1.18rem;
  font-weight: 400;
  color: var(--brand);
  line-height: 1.25;
  margin-bottom: 8px;
}
.product-card-desc {
  font-size: 0.82rem;
  color: var(--text-muted);
  line-height: 1.6;
  flex: 1;
  font-weight: 300;
  margin-bottom: 16px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.product-card-footer {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  margin-top: auto;
}
.product-price {
  font-family: var(--serif);
  font-size: 1.3rem;
  font-weight: 500;
  color: var(--brand);
}
.product-currency { font-size: 0.9rem; }

.btn-add-cart {
  padding: 9px 18px;
  background: var(--cream);
  border: 1px solid var(--accent);
  color: var(--accent);
  border-radius: var(--radius);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 500;
  transition: all var(--transition);
  white-space: nowrap;
}
.btn-add-cart:hover:not(.in-cart) {
  background: var(--accent);
  color: var(--white);
}
.btn-add-cart.in-cart {
  background: var(--success);
  border-color: var(--success);
  color: var(--white);
  cursor: default;
}
.btn-add-cart:disabled { opacity: 0.45; cursor: not-allowed; }

/* ===== VALUES STRIP ===== */
.values-strip {
  background: var(--brand);
  padding: 48px 5%;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 32px;
}
.value-item { text-align: center; }
.value-icon { font-size: 1.6rem; margin-bottom: 10px; }
.value-title {
  font-family: var(--serif);
  font-size: 1rem;
  color: var(--accent-light);
  margin-bottom: 4px;
  font-weight: 400;
}
.value-desc { font-size: 0.78rem; color: rgba(255,255,255,0.55); font-weight: 300; line-height: 1.5; }

/* ===== PRODUCT PAGE ===== */
.product-page-inner {
  max-width: 1160px;
  margin: 0 auto;
  padding: 60px 5%;
}
.product-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  margin-bottom: 80px;
}

.gallery-main {
  aspect-ratio: 1 / 1;
  overflow: hidden;
  background: var(--parchment);
  border-radius: 4px;
  cursor: zoom-in;
}
.gallery-main img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}
.gallery-main:hover img { transform: scale(1.03); }

.gallery-thumbs {
  display: flex; gap: 10px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.gallery-thumb {
  width: 64px; height: 64px;
  object-fit: cover;
  border-radius: 3px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color var(--transition);
  opacity: 0.7;
}
.gallery-thumb.active { border-color: var(--accent); opacity: 1; }
.gallery-thumb:hover { opacity: 1; }

.product-info { display: flex; flex-direction: column; gap: 0; }
.product-breadcrumb {
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-bottom: 12px;
  display: flex; gap: 0.5rem; align-items: center;
  text-transform: uppercase;
}
.product-breadcrumb span { cursor: pointer; }
.product-breadcrumb span:hover { color: var(--accent); }

.product-info-cat {
  font-size: 0.68rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
}
.product-info-name {
  font-family: var(--serif);
  font-size: clamp(1.8rem, 3vw, 2.6rem);
  font-weight: 400;
  color: var(--brand);
  line-height: 1.1;
  margin-bottom: 14px;
}
.product-info-price {
  font-family: var(--serif);
  font-size: 1.9rem;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 20px;
}
.product-info-desc {
  font-size: 0.9rem;
  color: var(--text-muted);
  line-height: 1.8;
  font-weight: 300;
  margin-bottom: 28px;
  border-top: 1px solid var(--border);
  padding-top: 20px;
}

.qty-row {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 20px;
}
.qty-label { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
.qty-control {
  display: flex; align-items: center;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.qty-btn {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  color: var(--text-muted);
  background: var(--parchment);
  transition: all var(--transition);
}
.qty-btn:hover { background: var(--sand); color: var(--brand); }
.qty-num {
  width: 44px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem;
  font-weight: 500;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  background: var(--white);
}

.btn-add-to-cart-lg {
  width: 100%;
  padding: 16px;
  background: var(--brand);
  color: var(--white);
  border-radius: var(--radius);
  font-size: 0.78rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-weight: 500;
  transition: all var(--transition);
  margin-bottom: 12px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-add-to-cart-lg:hover:not(.in-cart) { background: var(--accent); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(44,24,16,0.25); }
.btn-add-to-cart-lg.in-cart { background: var(--success); cursor: default; }
.btn-add-to-cart-lg:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

.product-stock-note { font-size: 0.75rem; color: var(--sage); display: flex; align-items: center; gap: 6px; }
.product-stock-note.low { color: #B45309; }
.product-stock-note.out { color: #DC2626; }

/* Related Products */
.related-section { border-top: 1px solid var(--border); padding-top: 60px; }
.related-title {
  font-family: var(--serif);
  font-size: 1.9rem;
  color: var(--brand);
  margin-bottom: 32px;
  text-align: center;
}

/* ===== CART PAGE ===== */
.cart-page-inner {
  max-width: 1000px; margin: 0 auto;
  padding: 60px 5%;
}
.page-title {
  font-family: var(--serif);
  font-size: clamp(2rem, 4vw, 3rem);
  color: var(--brand);
  font-weight: 400;
  margin-bottom: 8px;
}
.page-subtitle { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 40px; font-weight: 300; }

.cart-layout {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 40px;
  align-items: start;
}

.cart-items { display: flex; flex-direction: column; gap: 20px; }
.cart-item {
  display: grid;
  grid-template-columns: 88px 1fr auto;
  gap: 20px;
  align-items: center;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 16px;
  transition: box-shadow var(--transition);
}
.cart-item:hover { box-shadow: var(--shadow); }

.cart-item-img {
  width: 88px; height: 88px;
  object-fit: cover;
  border-radius: 3px;
  background: var(--parchment);
  cursor: pointer;
}
.cart-item-info {}
.cart-item-name {
  font-family: var(--serif);
  font-size: 1.05rem;
  color: var(--brand);
  margin-bottom: 4px;
  cursor: pointer;
}
.cart-item-name:hover { color: var(--accent); }
.cart-item-cat { font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
.cart-item-price { font-size: 0.88rem; color: var(--text-muted); }

.cart-item-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }
.cart-item-subtotal { font-family: var(--serif); font-size: 1.1rem; color: var(--brand); font-weight: 500; }
.cart-item-remove {
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  border-bottom: 1px solid transparent;
  transition: all var(--transition);
  cursor: pointer;
}
.cart-item-remove:hover { color: #DC2626; border-color: #DC2626; }

.cart-summary {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 28px;
  position: sticky;
  top: 88px;
}
.cart-summary-title {
  font-family: var(--serif);
  font-size: 1.3rem;
  color: var(--brand);
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.summary-row {
  display: flex; justify-content: space-between;
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.summary-total {
  display: flex; justify-content: space-between;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  margin-top: 4px;
}
.summary-total-label { font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--brand); font-weight: 500; }
.summary-total-val { font-family: var(--serif); font-size: 1.5rem; color: var(--brand); font-weight: 500; }

.btn-checkout {
  width: 100%;
  margin-top: 20px;
  padding: 15px;
  background: var(--brand);
  color: var(--white);
  border-radius: var(--radius);
  font-size: 0.78rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-weight: 500;
  transition: all var(--transition);
  cursor: pointer;
}
.btn-checkout:hover { background: var(--accent); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(44,24,16,0.25); }

.cart-empty {
  text-align: center;
  padding: 80px 20px;
}
.cart-empty-icon { font-size: 3.5rem; margin-bottom: 16px; opacity: 0.3; }
.cart-empty-title { font-family: var(--serif); font-size: 1.6rem; color: var(--brand); margin-bottom: 8px; }
.cart-empty-desc { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 24px; font-weight: 300; }

/* ===== CHECKOUT PAGE ===== */
.checkout-inner {
  max-width: 960px; margin: 0 auto;
  padding: 60px 5%;
}
.checkout-layout {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 40px;
  align-items: start;
}

.form-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 36px;
}
.form-card-title {
  font-family: var(--serif);
  font-size: 1.3rem;
  color: var(--brand);
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;

<!-- ===== MAIN JS ===== -->
<script>
// ===== INIT =====
document.getElementById('nav-store-name').textContent = CONFIG.storeName;
document.getElementById('nav-tagline').textContent = CONFIG.tagline;
document.getElementById('footer-store-name').textContent = CONFIG.storeName;
document.getElementById('footer-email').textContent = CONFIG.email;
document.getElementById('footer-phone').textContent = 'Phone: +91 ' + CONFIG.phone;
document.getElementById('footer-copy').textContent = '© ' + new Date().getFullYear() + ' ' + CONFIG.storeName + '. All rights reserved.';

// ===== CART =====
let cart = JSON.parse(localStorage.getItem('neo_cart') || '[]');

function saveCart() {
  localStorage.setItem('neo_cart', JSON.stringify(cart));
  updateCartCount();
}

function updateCartCount() {
  const total = cart.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cart-count').textContent = total;
}

function addToCart(productId, qty = 1) {
  const product = PRODUCTS.find(p => p.id === productId);
  if (!product || product.stock === 0) return;
  const existing = cart.find(i => i.id === productId);
  if (existing) {
    existing.qty = Math.min(existing.qty + qty, product.stock);
  } else {
    cart.push({ id: productId, qty: Math.min(qty, product.stock) });
  }
  saveCart();
  showToast(`${product.name} added to cart`);
  refreshCartButtons();
}

function removeFromCart(productId) {
  cart = cart.filter(i => i.id !== productId);
  saveCart();
  renderCartPage();
  refreshCartButtons();
}

function updateCartQty(productId, delta) {
  const item = cart.find(i => i.id === productId);
  const product = PRODUCTS.find(p => p.id === productId);
  if (!item) return;
  item.qty = Math.max(1, Math.min(item.qty + delta, product.stock));
  saveCart();
  renderCartPage();
}

function isInCart(productId) {
  return cart.some(i => i.id === productId);
}

function getCartTotal() {
  return cart.reduce((s, i) => {
    const p = PRODUCTS.find(pr => pr.id === i.id);
    return s + (p ? p.price * i.qty : 0);
  }, 0);
}

function refreshCartButtons() {
  document.querySelectorAll('[data-cart-btn]').forEach(btn => {
    const id = parseInt(btn.dataset.cartBtn);
    const product = PRODUCTS.find(p => p.id === id);
    if (!product) return;
    if (product.stock === 0) {
      btn.textContent = 'Out of Stock';
      btn.disabled = true;
      btn.classList.remove('in-cart');
    } else if (isInCart(id)) {
      btn.textContent = 'In Cart ✓';
      btn.classList.add('in-cart');
      btn.disabled = false;
    } else {
      btn.textContent = 'Add to Cart';
      btn.classList.remove('in-cart');
      btn.disabled = false;
    }
  });
}

// ===== ROUTING =====
let currentPage = '';
let currentProductId = null;

function navigate(hash) {
  window.location.hash = hash;
}

function handleRoute() {
  const hash = window.location.hash || '#home';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

  if (hash === '#home') {
    showPage('home');
    renderHomePage();
  } else if (hash.startsWith('#product-')) {
    const id = parseInt(hash.replace('#product-', ''));
    currentProductId = id;
    showPage('product');
    renderProductPage(id);
  } else if (hash === '#cart') {
    showPage('cart');
    renderCartPage();
  } else if (hash === '#checkout') {
    showPage('checkout');
    renderCheckoutPage();
  } else {
    showPage('home');
    renderHomePage();
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showPage(name) {
  document.getElementById('page-' + name).classList.add('active');
  currentPage = name;
}

window.addEventListener('hashchange', handleRoute);
window.addEventListener('load', handleRoute);

// Navbar scroll
window.addEventListener('scroll', () => {
  const nb = document.getElementById('navbar');
  nb.classList.toggle('scrolled', window.scrollY > 20);
});

// ===== HOME PAGE =====
let activeFilter = 'All';

function renderHomePage() {
  renderFilterBar();
  renderProductGrid();
  setTimeout(refreshCartButtons, 50);
}

function renderFilterBar() {
  const categories = ['All', ...new Set(PRODUCTS.map(p => p.category))];
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = categories.map(cat => `
    <button class="filter-btn ${cat === activeFilter ? 'active' : ''}"
      onclick="setFilter('${cat}')">${cat}</button>
  `).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  renderFilterBar();
  renderProductGrid();
  setTimeout(refreshCartButtons, 50);
}

function renderProductGrid() {
  const filtered = activeFilter === 'All' ? PRODUCTS : PRODUCTS.filter(p => p.category === activeFilter);
  const grid = document.getElementById('product-grid');
  grid.innerHTML = filtered.map(product => productCardHTML(product)).join('');
}

function productCardHTML(product) {
  const inCart = isInCart(product.id);
  const outOfStock = product.stock === 0;
  const btnText = outOfStock ? 'Out of Stock' : inCart ? 'In Cart ✓' : 'Add to Cart';
  const btnClass = outOfStock ? 'btn-add-cart' : inCart ? 'btn-add-cart in-cart' : 'btn-add-cart';
  return `
    <div class="product-card" onclick="navigate('#product-${product.id}')">
      <div class="product-card-img-wrap">
        <img class="product-card-img" src="${product.images[0]}" alt="${product.name}" loading="lazy">
        <div class="product-card-badge">${product.category}</div>
        ${outOfStock ? `<div class="out-of-stock-overlay"><span class="out-of-stock-label">Sold Out</span></div>` : ''}
      </div>
      <div class="product-card-body">
        <div class="product-card-cat">${product.category}</div>
        <div class="product-card-name">${product.name}</div>
        <div class="product-card-desc">${product.description}</div>
        <div class="product-card-footer">
          <div class="product-price"><span class="product-currency">${CONFIG.currency}</span>${product.price.toLocaleString('en-IN')}</div>
          <button class="${btnClass}" data-cart-btn="${product.id}"
            ${outOfStock ? 'disabled' : ''}
            onclick="event.stopPropagation(); if(!this.classList.contains('in-cart') && !this.disabled) addToCart(${product.id})"
          >${btnText}</button>
        </div>
      </div>
    </div>
  `;
}

// ===== PRODUCT PAGE =====
let detailQty = 1;

function renderProductPage(id) {
  const product = PRODUCTS.find(p => p.id === id);
  if (!product) { navigate('#home'); return; }
  detailQty = 1;

  const related = PRODUCTS.filter(p => p.id !== id && p.category === product.category).slice(0, 4);
  const inCart = isInCart(id);
  const outOfStock = product.stock === 0;
  const lowStock = product.stock > 0 && product.stock <= 5;

  const stockNote = outOfStock
    ? `<span class="product-stock-note out">✕ Out of stock</span>`
    : lowStock
      ? `<span class="product-stock-note low">⚠ Only ${product.stock} left</span>`
      : `<span class="product-stock-note">✓ In stock</span>`;

  const btnText = outOfStock ? 'Out of Stock' : inCart ? 'In Cart ✓' : 'Add to Cart';
  const btnClass = `btn-add-to-cart-lg${inCart ? ' in-cart' : ''}`;

  const thumbs = product.images.length > 1
    ? product.images.map((img, i) => `<img class="gallery-thumb ${i === 0 ? 'active' : ''}" src="${img}" alt="${product.name}" onclick="switchImage(this, '${img}')">`).join('')
    : '';

  const relatedHTML = related.length ? `
    <div class="related-section">
      <h3 class="related-title">You May Also Like</h3>
      <div class="product-grid">${related.map(p => productCardHTML(p)).join('')}</div>
    </div>` : '';

  document.getElementById('product-detail-content').innerHTML = `
    <div style="margin-bottom:24px;">
      <div class="product-breadcrumb">
        <span onclick="navigate('#home')">Shop</span> › <span>${product.category}</span> › <span>${product.name}</span>
      </div>
    </div>
    <div class="product-layout">
      <div>
        <div class="gallery-main">
          <img id="gallery-main-img" src="${product.images[0]}" alt="${product.name}">
        </div>
        ${thumbs ? `<div class="gallery-thumbs">${thumbs}</div>` : ''}
      </div>
      <div class="product-info">
        <div class="product-info-cat">${product.category}</div>
        <h1 class="product-info-name">${product.name}</h1>
        <div class="product-info-price">${CONFIG.currency}${product.price.toLocaleString('en-IN')}</div>
        <p class="product-info-desc">${product.description}</p>
        <div class="qty-row">
          <span class="qty-label">Qty</span>
          <div class="qty-control">
            <button class="qty-btn" onclick="changeDetailQty(-1)">−</button>
            <div class="qty-num" id="detail-qty-num">1</div>
            <button class="qty-btn" onclick="changeDetailQty(1)">+</button>
          </div>
          ${stockNote}
        </div>
        <button class="${btnClass}" id="detail-add-btn" data-cart-btn="${product.id}"
          ${outOfStock ? 'disabled' : ''}
          onclick="if(!this.classList.contains('in-cart') && !this.disabled){ addToCart(${product.id}, detailQty); this.textContent='In Cart ✓'; this.classList.add('in-cart'); }"
        >
          ${outOfStock ? '✕ ' : inCart ? '✓ ' : '+ '}${btnText}
        </button>
      </div>
    </div>
    ${relatedHTML}
  `;
  setTimeout(refreshCartButtons, 50);
}

function changeDetailQty(delta) {
  const product = PRODUCTS.find(p => p.id === currentProductId);
  if (!product) return;
  detailQty = Math.max(1, Math.min(detailQty + delta, product.stock || 1));
  document.getElementById('detail-qty-num').textContent = detailQty;
}

function switchImage(el, src) {
  document.getElementById('gallery-main-img').src = src;
  document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

// ===== CART PAGE =====
function renderCartPage() {
  const container = document.getElementById('cart-content');
  if (cart.length === 0) {
    document.getElementById('cart-subtitle').textContent = '';
    container.innerHTML = `
      <div class="cart-empty">
        <div class="cart-empty-icon">🛒</div>
        <div class="cart-empty-title">Your cart is empty</div>
        <div class="cart-empty-desc">Explore our botanical collection and find your new skincare ritual.</div>
        <button class="btn-primary" onclick="navigate('#home')">Shop Now</button>
      </div>`;
    return;
  }

  const itemCount = cart.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cart-subtitle').textContent = `${itemCount} item${itemCount !== 1 ? 's' : ''} in your cart`;

  const total = getCartTotal();
  const itemsHTML = cart.map(item => {
    const p = PRODUCTS.find(pr => pr.id === item.id);
    if (!p) return '';
    return `
      <div class="cart-item">
        <img class="cart-item-img" src="${p.images[0]}" alt="${p.name}" onclick="navigate('#product-${p.id}')">
        <div class="cart-item-info">
          <div class="cart-item-cat">${p.category}</div>
          <div class="cart-item-name" onclick="navigate('#product-${p.id}')">${p.name}</div>
          <div class="cart-item-price">${CONFIG.currency}${p.price.toLocaleString('en-IN')} each</div>
          <div class="qty-control" style="margin-top:10px;">
            <button class="qty-btn" onclick="updateCartQty(${p.id}, -1)">−</button>
            <div class="qty-num">${item.qty}</div>
            <button class="qty-btn" onclick="updateCartQty(${p.id}, 1)">+</button>
          </div>
        </div>
        <div class="cart-item-actions">
          <div class="cart-item-subtotal">${CONFIG.currency}${(p.price * item.qty).toLocaleString('en-IN')}</div>
          <span class="cart-item-remove" onclick="removeFromCart(${p.id})">Remove</span>
        </div>
      </div>`;
  }).join('');

  container.innerHTML = `
    <div class="cart-layout">
      <div class="cart-items">${itemsHTML}</div>
      <div class="cart-summary">
        <div class="cart-summary-title">Order Summary</div>
        <div class="summary-row"><span>Subtotal</span><span>${CONFIG.currency}${total.toLocaleString('en-IN')}</span></div>
        <div class="summary-row"><span>Shipping</span><span>Calculated at checkout</span></div>
        <div class="summary-total">
          <span class="summary-total-label">Total</span>
          <span class="summary-total-val">${CONFIG.currency}${total.toLocaleString('en-IN')}</span>
        </div>
        <button class="btn-checkout" onclick="navigate('#checkout')">Proceed to Checkout →</button>
        <div style="text-align:center;margin-top:14px;">
          <span style="font-size:0.72rem;color:var(--text-muted);letter-spacing:0.06em;cursor:pointer;" onclick="navigate('#home')">← Continue Shopping</span>
        </div>
      </div>
    </div>`;
}

// ===== CHECKOUT PAGE =====
function renderCheckoutPage() {
  if (cart.length === 0) {
    document.getElementById('checkout-content').innerHTML = `
      <div class="cart-empty">
        <div class="cart-empty-icon">🌿</div>
        <div class="cart-empty-title">Nothing to checkout</div>
        <div class="cart-empty-desc">Add some products to your cart first.</div>
        <button class="btn-primary" onclick="navigate('#home')">Shop Now</button>
      </div>`;
    return;
  }

  const total = getCartTotal();
  const orderItemsHTML = cart.map(item => {
    const p = PRODUCTS.find(pr => pr.id === item.id);
    if (!p) return '';
    return `
      <div class="order-item">
        <div class="order-item-info">
          <div class="order-item-name">${p.name}</div>
          <div class="order-item-qty">Qty: ${item.qty}</div>
        </div>
        <div class="order-item-price">${CONFIG.currency}${(p.price * item.qty).toLocaleString('en-IN')}</div>
      </div>`;
  }).join('');

  document.getElementById('checkout-content').innerHTML = `
    <div class="checkout-layout">
      <div class="form-card">
        <div class="form-card-title">Delivery Information</div>
        <div class="form-grid" id="checkout-form">
          <div class="form-group">
            <label class="form-label">Full Name *</label>
            <input class="form-input" type="text" id="field-name" placeholder="Priya Sharma" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email *</label>
            <input class="form-input" type="email" id="field-email" placeholder="you@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Phone *</label>
            <input class="form-input" type="tel" id="field-phone" placeholder="+91 98765 43210" required>
          </div>
          <div class="form-group full">
            <label class="form-label">Delivery Address *</label>
            <textarea class="form-input" id="field-address" placeholder="Flat / House No., Street, City, State, PIN" required></textarea>
          </div>
          <div class="form-group full">
            <label class="form-label">Order Notes (optional)</label>
            <input class="form-input" type="text" id="field-notes" placeholder="Any special instructions…">
          </div>
          <div class="form-group full">
            <button class="btn-submit" id="submit-btn" onclick="submitOrder()">Place Order →</button>
          </div>
        </div>
      </div>
      <div class="order-summary-card">
        <div class="order-summary-title">Your Order</div>
        ${orderItemsHTML}
        <div class="summary-row" style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border);">
          <span>Subtotal</span><span>${CONFIG.currency}${total.toLocaleString('en-IN')}</span>
        </div>
        <div class="summary-row"><span>Shipping</span><span>TBD</span></div>
        <div class="summary-total" style="margin-top:8px;">
          <span class="summary-total-label">Total</span>
          <span class="summary-total-val">${CONFIG.currency}${total.toLocaleString('en-IN')}</span>
        </div>
        <div style="margin-top:20px;padding:14px;background:var(--white);border-radius:3px;border:1px solid var(--border);">
          <div style="font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;">Need Help?</div>
          <div style="font-size:0.8rem;color:var(--text-muted);font-weight:300;">
            📞 +91 ${CONFIG.phone}<br>
            ✉ ${CONFIG.email}
          </div>
        </div>
      </div>
    </div>`;
}

async function submitOrder() {
  const name = document.getElementById('field-name').value.trim();
  const email = document.getElementById('field-email').value.trim();
  const phone = document.getElementById('field-phone').value.trim();
  const address = document.getElementById('field-address').value.trim();
  const notes = document.getElementById('field-notes').value.trim();

  if (!name || !email || !phone || !address) {
    showToast('Please fill in all required fields.');
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Placing Order…';

  const orderItems = cart.map(item => {
    const p = PRODUCTS.find(pr => pr.id === item.id);
    return `${p.name} x${item.qty} = ${CONFIG.currency}${(p.price * item.qty).toLocaleString('en-IN')}`;
  }).join('\n');

  const total = getCartTotal();

  const formData = new FormData();
  formData.append('name', name);
  formData.append('email', email);
  formData.append('phone', phone);
  formData.append('address', address);
  formData.append('notes', notes || 'None');
  formData.append('order_items', orderItems);
  formData.append('order_total', `${CONFIG.currency}${total.toLocaleString('en-IN')}`);
  formData.append('store', CONFIG.storeName);

  try {
    const res = await fetch(CONFIG.formspreeUrl, {
      method: 'POST',
      body: formData,
      headers: { 'Accept': 'application/json' }
    });

    if (res.ok) {
      showSuccess();
    } else {
      btn.disabled = false;
      btn.textContent = 'Place Order →';
      showToast('Something went wrong. Please try again.');
    }
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Place Order →';
    showToast('Network error. Please check your connection.');
  }
}

function showSuccess() {
  cart = [];
  saveCart();
  const overlay = document.getElementById('success-overlay');
  overlay.classList.add('show');
  let secs = 3;
  const cd = document.getElementById('success-countdown');
  const interval = setInterval(() => {
    secs--;
    cd.textContent = `Redirecting in ${secs} second${secs !== 1 ? 's' : ''}…`;
    if (secs <= 0) {
      clearInterval(interval);
      overlay.classList.remove('show');
      navigate('#home');
    }
  }, 1000);
}

// ===== UTILS =====
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

function scrollToAbout() {
  navigate('#home');
  setTimeout(() => {
    const el = document.getElementById('about-section');
    if (el) el.scrollIntoView({ behavior: 'smooth' });
  }, 200);
}

function toggleMenu() {
  document.getElementById('nav-links').classList.toggle('open');
}
function closeMenu() {
  document.getElementById('nav-links').classList.remove('open');
}

// Init cart count
updateCartCount();
</script>
